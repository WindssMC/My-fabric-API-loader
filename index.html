<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Fabric Web Loader</title>
    <!-- Loads the Java runtime engine into Safari -->
    <script src="https://leaningtech.com"></script>
    <style>
        body { margin: 0; background: #141414; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-canvas { width: 100vw; height: 80vh; background: black; display: none; }
        .controls { padding: 20px; text-align: center; }
        button, input[type="file"] { padding: 10px 20px; font-size: 16px; margin: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="setup-screen" class="controls">
        <h2>Fabric .jar Web Loader</h2>
        <p>Upload your Fabric API and Mod .jar files:</p>
        <input type="file" id="mod-input" accept=".jar" multiple><br>
        <button onclick="bootGame()">Launch Game</button>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        // Initialize CheerpJ Java Runtime Environment
        cheerpjInit();

        async function bootGame() {
            const files = document.getElementById('mod-input').files;
            if (files.length === 0) {
                alert("Please upload at least the Fabric API .jar!");
                return;
            }

            // Hide UI, show fullscreen game canvas
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-canvas').style.display = 'block';

            console.log("Loading Java Virtual Machine inside Safari...");
            
            // This initializes a virtual Java execution point targeting a main MC runtime
            // In a complete build, you would point this to your compiled Java/Fabric main class
            // cheerpjRunMain("net.fabricmc.loader.impl.launch.knot.KnotClient", "/str/app.jar");
        }
    </script>
</body>
</html>
